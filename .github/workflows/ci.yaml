name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  # Use the same Rust toolchain across jobs so they can share a cache.
  # Keep this in sync with https://github.com/TheBevyFlock/bevy_cli/blob/main/rust-toolchain.toml
  toolchain: nightly-2026-03-05

jobs:
  # Run tests.
  test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          components: rustc-codegen-cranelift-preview
          toolchain: ${{ env.toolchain }}

      - name: Set LD_LIBRARY_PATH
        run: |
          echo "LD_LIBRARY_PATH=$(rustc --print target-libdir)" >> $GITHUB_ENV

      - name: Populate target directory from cache
        uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-directories: ${{ env.LD_LIBRARY_PATH }}

      - name: Install dependencies
        run: sudo apt-get update; sudo apt-get install --no-install-recommends libasound2-dev libudev-dev libwayland-dev

      - name: Activate CI cargo config
        run: mv .cargo/config_ci.toml .cargo/config.toml

      - name: Install cargo binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install Wild
        run: cargo binstall wild-linker --locked --force

      - name: Install nextest
        run: cargo binstall cargo-nextest --locked --force

      - name: Run tests
        run: cargo nextest run --locked --workspace --lib --bins --tests --no-fail-fast --no-tests warn

      - name: Run doctests
        run: cargo test --locked --workspace --doc

  # The Windows dylib smoke job that previously ran here is removed
  # while the dylib path is experimental. Re-add when the dylib flow
  # is stable enough to gate PRs on.

  # Scaffold each shipping template via `cargo generate` and run
  # `cargo check` to catch template regressions: missing/renamed
  # deps, stale API usage in main.rs/lib.rs, broken Cargo.toml
  # syntax, etc. Modeled after bevy_new_2d's template CI: one job
  # per template via matrix so each template gets its own CI line
  # and failures don't cascade. The scaffolded project's `jackdaw`
  # and `jackdaw_runtime` deps are patched to point at the
  # workspace checkout under test so we exercise THIS PR's runtime
  # against THIS PR's templates instead of whatever happens to be
  # on `main`.
  templates:
    name: Template - ${{ matrix.template }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        template:
          - game-static
          - extension-static
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          components: rustc-codegen-cranelift-preview
          toolchain: ${{ env.toolchain }}

      - name: Set LD_LIBRARY_PATH
        run: echo "LD_LIBRARY_PATH=$(rustc --print target-libdir)" >> $GITHUB_ENV

      - name: Activate CI cargo config
        run: mv .cargo/config_ci.toml .cargo/config.toml

      - name: Install cargo binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install Wild
        run: cargo binstall wild-linker --locked --force

      - name: Install cargo-generate
        run: cargo binstall cargo-generate --locked --force

      - name: Install dependencies
        run: sudo apt-get update; sudo apt-get install --no-install-recommends libasound2-dev libudev-dev libwayland-dev

      - name: Populate target directory from cache
        uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
          shared-key: template-${{ matrix.template }}

      - name: Scaffold ${{ matrix.template }}
        env:
          # Suppress cargo-generate's interactive author prompt; the
          # scaffolder fills `authors` from this env in CI.
          CARGO_GENERATE_VALUE_AUTHORS: "ci@jackdaw"
        run: |
          set -euxo pipefail
          checkout="$GITHUB_WORKSPACE"
          template="${{ matrix.template }}"
          name="test_$(echo "$template" | tr - _)"
          rm -rf "$RUNNER_TEMP/$name"
          cargo generate \
            --path "$checkout/templates/$template" \
            --name "$name" \
            --destination "$RUNNER_TEMP" \
            --silent
          # Pin the scaffolded project's `jackdaw` / `jackdaw_runtime`
          # deps to THIS checkout so we test the template against
          # the PR under review, not against whatever's on crates.io
          # (or even before 0.4.0 ships at all). `[patch.crates-io]`
          # overrides the source: cargo resolves the version
          # constraint against the patched path's Cargo.toml, so
          # this works pre-publish.
          cat >> "$RUNNER_TEMP/$name/Cargo.toml" <<EOF

          [patch.crates-io]
          jackdaw = { path = "$checkout" }
          jackdaw_runtime = { path = "$checkout/crates/jackdaw_runtime" }
          EOF

      - name: Compile ${{ matrix.template }}
        # No `--locked`: cargo-generate doesn't ship a Cargo.lock,
        # and the patched jackdaw deps would mismatch one anyway.
        run: |
          set -euxo pipefail
          name="test_$(echo "${{ matrix.template }}" | tr - _)"
          cd "$RUNNER_TEMP/$name"
          cargo check --all-targets

      - name: Test ${{ matrix.template }} with editor feature
        # Game-static ships a smoke test that exercises the
        # editor's component picker against the project's own
        # `MyGamePlugin`. Skip for templates without a `tests/`
        # directory.
        run: |
          set -euxo pipefail
          name="test_$(echo "${{ matrix.template }}" | tr - _)"
          cd "$RUNNER_TEMP/$name"
          if [[ -d tests ]]; then
            cargo test --features editor
          else
            echo "no tests/ directory in scaffolded ${{ matrix.template }}; skipping"
          fi

  # Run clippy lints.
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          components: clippy, rustc-codegen-cranelift-preview
          toolchain: ${{ env.toolchain }}

      - name: Set LD_LIBRARY_PATH
        run: echo "LD_LIBRARY_PATH=$(rustc --print target-libdir)" >> $GITHUB_ENV

      - name: Activate CI cargo config
        run: mv .cargo/config_ci.toml .cargo/config.toml

      - name: Install cargo binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install Wild
        run: cargo binstall wild-linker --locked --force

      - name: Install dependencies
        run: sudo apt-get update; sudo apt-get install --no-install-recommends libasound2-dev libudev-dev libwayland-dev

      - name: Populate target directory from cache
        uses: Swatinem/rust-cache@v2
        with:
          save-if: false
          shared-key: lints

      - name: Run clippy lints
        run: cargo clippy --locked --workspace --all-targets -- --deny warnings

  # Check formatting.
  format:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          components: rustfmt
          toolchain: ${{ env.toolchain }}

      - name: Run cargo fmt
        run: cargo fmt --all -- --check

  # Check documentation.
  doc:
    name: Docs
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          components: rustc-codegen-cranelift-preview
          toolchain: ${{ env.toolchain }}

      - name: Set LD_LIBRARY_PATH
        run: echo "LD_LIBRARY_PATH=$(rustc --print target-libdir)" >> $GITHUB_ENV

      - name: Activate CI cargo config
        run: mv .cargo/config_ci.toml .cargo/config.toml

      - name: Install cargo binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install Wild
        run: cargo binstall wild-linker --locked --force

      - name: Install dependencies
        run: sudo apt-get update; sudo apt-get install --no-install-recommends libasound2-dev libudev-dev libwayland-dev

      - name: Populate target directory from cache
        uses: Swatinem/rust-cache@v2
        with:
          save-if: false
          shared-key: lints

      - name: Check documentation
        run: cargo doc --locked --workspace --document-private-items --no-deps

  # Run Bevy lints.
  bevy-lint:
    name: Bevy linter
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          components: rustc-codegen-cranelift-preview, rustc-dev, llvm-tools-preview
          toolchain: ${{ env.toolchain }}

      - name: Install dependencies
        run: sudo apt-get update; sudo apt-get install --no-install-recommends libasound2-dev libudev-dev libwayland-dev

      - name: Populate target directory from cache
        uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
          shared-key: lints

      - name: Install Bevy linter
        run: cargo install --git https://github.com/TheBevyFlock/bevy_cli --locked bevy_lint

      - name: Add cranelift to rustc
        run: rustup component add rustc-codegen-cranelift-preview --toolchain ${{ env.toolchain }}

      - name: Active CI cargo config
        run: mv .cargo/config_ci.toml .cargo/config.toml

      - name: Install cargo binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install Wild
        run: cargo binstall wild-linker --locked --force

      - name: Run Bevy linter
        run: bevy_lint --locked --workspace --all-targets
