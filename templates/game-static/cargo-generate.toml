[template]
cargo_generate_version = ">=0.10.0"

# Only `.template` files go through Liquid substitution. Everything
# else (README.md, LICENSE, dotfiles, the assets/ tree) is copied
# verbatim. The post-generate hook renames the `.template` files.
include = ["*.template"]
ignore = [
    "target",
    "README.md",
]

[hooks]
post = ["post-generate.rhai"]
